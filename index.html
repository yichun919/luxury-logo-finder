<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Logo Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface2: #1c1c1c;
        --border: rgba(255, 255, 255, 0.08);
        --border-h: rgba(255, 255, 255, 0.18);
        --text: #f0ede8;
        --muted: rgba(240, 237, 232, 0.45);
        --gold: #d4af85;
        --font-d: "Cormorant Garamond", serif;
        --font-b: "DM Sans", sans-serif;
      }

      html {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-b);
      }

      body {
        max-width: 760px;
        margin: 0 auto;
        padding: 3rem 2rem 5rem;
      }

      button,
      input {
        font: inherit;
      }

      header {
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-family: var(--font-d);
        font-weight: 300;
        font-size: clamp(2rem, 5vw, 2.8rem);
        letter-spacing: 0.04em;
        line-height: 1.1;
      }

      header h1 span {
        color: var(--gold);
      }

      header p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.03em;
      }

      .lbl {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .divider {
        height: 0.5px;
        margin: 1.75rem 0;
        background: var(--border);
      }

      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.25rem;
      }

      .search-row input {
        flex: 1;
        min-width: 0;
        height: 42px;
        border: 0.5px solid var(--border);
        border-radius: 6px;
        padding: 0 14px;
        background: var(--surface);
        color: var(--text);
        font-family: var(--font-b);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-row input::placeholder {
        color: var(--muted);
      }

      .search-row input:focus {
        border-color: var(--border-h);
      }

      .search-row button {
        height: 42px;
        border: 0.5px solid var(--gold);
        border-radius: 6px;
        padding: 0 20px;
        background: transparent;
        color: var(--gold);
        font-family: var(--font-b);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .search-row button:hover {
        background: rgba(212, 175, 133, 0.08);
      }

      .cats,
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .cats {
        margin-bottom: 1.25rem;
      }

      .pills {
        margin-bottom: 1.75rem;
      }

      .cat,
      .pill {
        border: 0.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-b);
        cursor: pointer;
        transition: all 0.2s;
      }

      .cat {
        border-radius: 99px;
        padding: 5px 14px;
        font-size: 12px;
      }

      .cat:hover {
        border-color: var(--border-h);
        color: var(--text);
      }

      .cat.on {
        border-color: var(--gold);
        background: rgba(212, 175, 133, 0.06);
        color: var(--gold);
      }

      .pill {
        border-radius: 4px;
        padding: 4px 11px;
        background: var(--surface);
        font-size: 12px;
        transition: all 0.15s;
      }

      .pill:hover {
        border-color: var(--border-h);
        color: var(--text);
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.75rem;
      }

      .clabel {
        color: var(--muted);
        font-size: 12px;
      }

      .cswatch {
        width: 30px;
        height: 30px;
        border: 2px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .cswatch.on {
        border-color: var(--gold);
      }

      .cswatch:hover {
        transform: scale(1.1);
      }

      .s-black {
        background: #000;
        box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.15);
      }

      .s-white {
        background: #fff;
      }

      .s-teal {
        background: #003c4c;
      }

      #status {
        min-height: 16px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .result {
        display: none;
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 2rem;
        background: var(--surface);
        text-align: center;
        animation: fadeIn 0.3s ease;
      }

      .result.show {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .prev-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 140px;
        margin-bottom: 1.25rem;
        overflow: hidden;
        border: 0.5px solid rgba(255, 255, 255, 0.06);
        border-radius: 6px;
      }

      .prev-wrap canvas {
        display: block;
        max-width: 100%;
        max-height: 136px;
      }

      .result-name {
        margin-bottom: 1rem;
        color: var(--text);
        font-family: var(--font-d);
        font-size: 18px;
        font-weight: 300;
        letter-spacing: 0.04em;
      }

      .btn-row {
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 40px;
        border: 0.5px solid var(--border-h);
        border-radius: 6px;
        padding: 0 20px;
        background: transparent;
        color: var(--muted);
        font-family: var(--font-b);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: var(--text);
      }

      .btn.primary {
        border-color: var(--gold);
        color: var(--gold);
      }

      .btn.primary:hover {
        background: rgba(212, 175, 133, 0.1);
      }

      .btn svg {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
      }

      .source-tag {
        margin-bottom: 0.75rem;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .source-link {
        display: inline-flex;
        margin-bottom: 1rem;
        color: var(--muted);
        font-size: 11px;
        text-decoration: none;
      }

      .source-link:hover {
        color: var(--text);
      }

      .not-found {
        margin-top: 4px;
        border: 0.5px solid var(--border);
        border-radius: 10px;
        padding: 1.5rem;
        background: var(--surface);
        text-align: center;
      }

      .not-found p {
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .fallback-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }

      .fallback-links a {
        border: 0.5px solid var(--border);
        border-radius: 99px;
        padding: 5px 14px;
        color: var(--muted);
        font-size: 12px;
        text-decoration: none;
        transition: all 0.15s;
      }

      .fallback-links a:hover {
        border-color: var(--border-h);
        color: var(--text);
      }

      canvas#canvas {
        display: none;
      }

      footer {
        margin-top: 4rem;
        color: rgba(240, 237, 232, 0.2);
        font-size: 11px;
        letter-spacing: 0.05em;
        text-align: center;
      }

      @media (max-width: 560px) {
        body {
          padding: 2rem 1rem 4rem;
        }

        .result {
          padding: 1.25rem;
        }

        .search-row,
        .btn-row {
          flex-direction: column;
        }

        .search-row button,
        .btn {
          justify-content: center;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Luxury <span>Logo</span> Finder</h1>
      <p>Search · Recolor · Download PNG</p>
    </header>

    <div class="lbl">Category</div>
    <div class="cats" id="cats"></div>
    <div class="lbl">Quick Select</div>
    <div class="pills" id="pills"></div>

    <div class="divider"></div>

    <div class="search-row">
      <input type="text" id="q" placeholder="Search brand name..." />
      <button id="search-btn" type="button">Search</button>
    </div>

    <div class="color-row">
      <span class="clabel">Color</span>
      <div class="cswatch s-black on" id="sw-black" title="Black" data-color="#000000" data-id="black"></div>
      <div class="cswatch s-white" id="sw-white" title="White" data-color="#ffffff" data-id="white"></div>
      <div class="cswatch s-teal" id="sw-teal" title="#003C4C" data-color="#003c4c" data-id="teal"></div>
    </div>

    <div id="status">Select a brand or search to get started.</div>

    <div class="result" id="result">
      <div class="source-tag" id="source-tag"></div>
      <a class="source-link" id="source-link" href="#" target="_blank" rel="noreferrer" style="display: none"></a>
      <div class="result-name" id="result-name"></div>
      <div class="prev-wrap" id="prev-wrap"></div>
      <canvas id="canvas"></canvas>
      <div class="btn-row">
        <button class="btn" id="btn-copy" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy
        </button>
        <button class="btn primary" id="btn-dl" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v13m0 0-4-4m4 4 4-4M3 21h18"></path>
          </svg>
          Download PNG
        </button>
      </div>
    </div>

    <div id="not-found" style="display: none"></div>
    <footer>Logos and trademarks belong to their respective owners. Use downloaded assets according to each brand's guidelines.</footer>

      const WORDMARK_OVERRIDES = {
        blancpain: {

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function getDomain(brand) {
        const key = brand.toLowerCase().trim();
        if (DOMAIN_MAP[key]) return DOMAIN_MAP[key];
        return `${key.replace(/[\s'&.,]+/g, "").replace(/[èéê]/g, "e")}.com`;
      }

      function getBrandKey(brand) {
        return brand.toLowerCase().trim().replace(/\s+/g, " ");
      }

      function buildCats() {
        const cats = document.getElementById("cats");
        cats.innerHTML = "";
        Object.keys(CATS).forEach((name) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `cat${name === activeCat ? " on" : ""}`;
          button.textContent = name;
          button.addEventListener("click", () => {
            activeCat = name;
            buildCats();
            buildPills();
          });
          cats.appendChild(button);
        });
      }

      function buildPills() {
        const pills = document.getElementById("pills");
        pills.innerHTML = "";
        CATS[activeCat].forEach((brand) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "pill";
          button.textContent = brand;
          button.addEventListener("click", () => {
            q.value = brand;
            go();
          });
          pills.appendChild(button);
        });
      }

      function setColor(id, hex) {
        chosenColor = hex;
        chosenId = id;
        document.querySelectorAll(".cswatch").forEach((swatch) => swatch.classList.remove("on"));
        document.getElementById(`sw-${id}`).classList.add("on");
        if (window._logo) renderCanvas(window._logoSource || "local");
      }

      function go() {
        const brand = q.value.trim();
        if (!brand) {
          setStatus("Please enter a brand name.");
          return;
        }

        currentBrand = brand;
        result.classList.remove("show");
        notFound.style.display = "none";
        window._logo = null;

        fetchOnline(brand);
      }

      function fetchOnline(brand) {
        const override = WORDMARK_OVERRIDES[getBrandKey(brand)];
        if (override) {
          renderWordmarkOverride(override);
          return;
        }

        setStatus("Fetching logo online...");
        const domain = getDomain(brand);
        tryLoad(
          [
            `https://cdn.brandfetch.io/${domain}/w/400/h/200/logo`,
            `https://logo.clearbit.com/${domain}?size=400`,
          ],
          0,
          brand,
          domain,
        );
      }

      function drawLetterspacedText(ctx, text, x, y, spacing) {
        const chars = [...text];
        const width = chars.reduce((total, char, index) => total + ctx.measureText(char).width + (index ? spacing : 0), 0);
        let cursor = x - width / 2;
        chars.forEach((char, index) => {
          if (index) cursor += spacing;
          ctx.fillText(char, cursor, y);
          cursor += ctx.measureText(char).width;
        });
      }

      async function renderWordmarkOverride(override) {
        setStatus(`${override.label} uses a curated current wordmark override.`);
        currentBrand = override.label;
        if (document.fonts && document.fonts.ready) await document.fonts.ready;

        const wordmark = document.createElement("canvas");
        wordmark.width = 1000;
        wordmark.height = 260;
        const ctx = wordmark.getContext("2d");
        ctx.clearRect(0, 0, wordmark.width, wordmark.height);
        ctx.fillStyle = "#000000";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        const family = override.fontFamily || '"Cormorant Garamond", "Times New Roman", serif';
        ctx.font = `${override.fontStyle || "normal"} ${override.fontWeight || 500} ${override.fontSize || 108}px ${family}`;
        const mainY = override.subText ? wordmark.height / 2 - 22 : wordmark.height / 2;
        drawLetterspacedText(ctx, override.text, wordmark.width / 2, mainY, override.letterSpacing ?? 12);
        if (override.subText) {
          ctx.font = `${override.subFontWeight || 400} ${override.subFontSize || 32}px ${family}`;
          drawLetterspacedText(ctx, override.subText, wordmark.width / 2, wordmark.height / 2 + 66, override.subLetterSpacing ?? 4);
        }

        window._logo = wordmark;
        window._logoSource = "override";
        window._logoMeta = override;
        renderCanvas("override");
      }

      function tryLoad(srcs, index, brand, domain) {
        if (index >= srcs.length) {
          setStatus("");
          showNotFound(brand, domain);
          return;
        }

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          if (img.naturalWidth < 10) {
            tryLoad(srcs, index + 1, brand, domain);
            return;
          }
          window._logo = img;
          window._logoSource = "online";
          setStatus("Logo found online.");
          renderCanvas("online");
        };
        img.onerror = () => tryLoad(srcs, index + 1, brand, domain);
        img.src = srcs[index];
      }

      function showNotFound(brand, domain) {
        const enc = encodeURIComponent(brand);
        notFound.innerHTML = `<div class="not-found"><p>No downloadable logo found for "<strong style="color:var(--text)">${escapeHtml(brand)}</strong>". Try an official source before using the asset publicly.</p><div class="fallback-links"><a href="https://www.google.com/search?q=${enc}+official+brand+assets+logo" target="_blank" rel="noreferrer">Official assets</a><a href="https://brandfetch.com/${encodeURIComponent(domain)}" target="_blank" rel="noreferrer">Brandfetch</a><a href="https://seeklogo.com/search#term=${enc}" target="_blank" rel="noreferrer">Seeklogo</a><a href="https://worldvectorlogo.com/search/${enc}" target="_blank" rel="noreferrer">WorldVectorLogo</a><a href="https://www.google.com/search?q=${enc}+logo+PNG+transparent&tbm=isch&tbs=ic:trans" target="_blank" rel="noreferrer">Google Images</a></div></div>`;
        notFound.style.display = "block";
      }

      function getDrawableSize(src, maxW, maxH) {
        const width = src.naturalWidth || src.width;
        const height = src.naturalHeight || src.height;
        const scale = Math.min(maxW / width, maxH / height, 1);
        return { width, height, dw: width * scale, dh: height * scale };
      }

      function recolorLogo(sourceCanvas, color) {
        const ctx = sourceCanvas.getContext("2d");
        const imageData = ctx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        const data = imageData.data;
        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);

        for (let p = 0; p < data.length; p += 4) {
          if (data[p + 3] <= 10) continue;
          const alpha = data[p + 3] / 255;
          const lum = (data[p] * 0.299 + data[p + 1] * 0.587 + data[p + 2] * 0.114) / 255;
          data[p] = Math.round(r * (1 - lum) + 255 * lum);
          data[p + 1] = Math.round(g * (1 - lum) + 255 * lum);
          data[p + 2] = Math.round(b * (1 - lum) + 255 * lum);
          data[p + 3] = Math.round(alpha * 255);
        }

        ctx.putImageData(imageData, 0, 0);
      }

      function renderCanvas(source) {
        const src = window._logo;
        if (!src) return;

        const W = 600;
        const H = 250;
        const PAD = 48;
        const ctx = canvas.getContext("2d");
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        try {
          const { dw, dh } = getDrawableSize(src, W - PAD * 2, H - PAD * 2);
          ctx.drawImage(src, (W - dw) / 2, (H - dh) / 2, dw, dh);
          recolorLogo(canvas, chosenColor);
        } catch {
          setStatus("This source blocks browser download/recolor. Use the official links below.");
          showNotFound(currentBrand, getDomain(currentBrand));
          return;
        }

        const wrap = document.getElementById("prev-wrap");
        wrap.style.background = chosenColor === "#ffffff" ? "#e0e0e0" : "#f0ede8";
        const preview = document.createElement("canvas");
        preview.width = W;
        preview.height = H;
        preview.getContext("2d").drawImage(canvas, 0, 0);
        wrap.innerHTML = "";
        wrap.appendChild(preview);

        const meta = source === "override" ? window._logoMeta : null;
        document.getElementById("source-tag").textContent = meta ? meta.note : "Online source";
        if (meta?.linkUrl) {
          sourceLink.href = meta.linkUrl;
          sourceLink.textContent = meta.linkText;
          sourceLink.style.display = "inline-flex";
        } else {
          sourceLink.style.display = "none";
          sourceLink.removeAttribute("href");
          sourceLink.textContent = "";
        }
        document.getElementById("result-name").textContent = currentBrand;
        result.classList.add("show");

        const fname = `${currentBrand.replace(/\s+/g, "-").toLowerCase()}-${chosenId}.png`;
        downloadButton.onclick = () => {
          try {
            const a = document.createElement("a");
            a.download = fname;
            a.href = canvas.toDataURL("image/png");
            a.click();
          } catch {
            setStatus("Download is blocked by this image source. Try an official source link.");
            showNotFound(currentBrand, getDomain(currentBrand));
          }
        };
        copyButton.onclick = () => copyCanvas();
      }

      function copyCanvas() {
        canvas.toBlob(async (blob) => {
          try {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            copyButton.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg> Copied!`;
            setTimeout(() => {
              copyButton.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
            }, 2000);
          } catch {
            const fallback = window.open("");
            if (!fallback) {
              setStatus("Copy failed. Use Download PNG instead.");
              return;
            }
            const img = document.createElement("img");
            img.src = canvas.toDataURL("image/png");
            img.style.maxWidth = "100%";
            fallback.document.write('<p style="font-family:sans-serif;font-size:13px;padding:16px;color:#555">Right-click -> Copy Image</p>');
            fallback.document.body.appendChild(img);
          }
        }, "image/png");
      }

      document.getElementById("search-btn").addEventListener("click", go);
      document.querySelectorAll(".cswatch").forEach((swatch) => {
        swatch.addEventListener("click", () => setColor(swatch.dataset.id, swatch.dataset.color));
      });
      q.addEventListener("keydown", (event) => {
        if (event.key === "Enter") go();
      });

      buildCats();
      buildPills();
    </script>
  </body>
</html>
